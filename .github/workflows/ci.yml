name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run index integrity checks
        run: pytest tests/integration/test_index_integrity.py -q

      - name: Run API smoke tests
        run: pytest tests/integration/test_api_smoke.py -q
